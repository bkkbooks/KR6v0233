body:
  text: 碑陽額嵩陽寺倫統碑本文中岳嵩陽寺碑銘序夫至理空淨非大智無以寄其言法身凝寂非妙信無以感其像故託金軀於至敬之國布慈雲於多士之世顯皮紙骨筆之重半偈亡身之貴是以須達崇善填金弗吝優王仰戀鐫檀寫真斯皆聖人留軌為物樹業故然乃遺形八万還昇慧頂有大德沙門生禪師遊三空以歸真汎法流而御世控三車而徽蹤秉常樂以係軌隱顯無方沉浮崧嶺道風遠被德香普薰乃皇帝傾心以師資朝野望風而屈膝此山先來未有塔廟禪師將欲接引四生永辭沸鑊拯拔群品遠離炎鑪卜茲福地創立神場當中岳之要害對眾術之摳牙乃北背高峰南臨廣陌西帶濬澗東接脩林於太和八年歲次甲子建造伽藍築立塔殿布置僧坊略深梗概公王卿士咸發布向之心凡厥庶民並欣喜捨之志司空公裴衍昔在齊都欽承師德願歸中國為寺檀主本願既從雲歸表節禪師乃構千善靈塔一十五層始就七級緣差中止而七層之狀遠望則迢亭魏峨仰參天漢近視則嵬儼嶷旁魄絕望自佛法光興未有斯壯也禪師指麾成之匪日禪師背後雖復名工巧匠無能陟其嶮峭禪師大弟子沙門統倫艷二法師並妙思淵賾神智難量繼軌四依津道緣世覺華散藻戒香氛馥與諸同志以師遺功成茲洪業分稟餘塼更罩兩塔並各七層仰副師願殊特妙巧創秀出塔殿宮堂星羅棋布內外圖寫本生泥曰十方尊儀無量億數或鑄金為相裁玉成豪瓖碧煜爍丹彩絢燿色煥光煇宇宙異類眾多罔知厝緒龕房禪室側環遶逕閣通門前後樓墻廊重複菀衍逶迤規而有楷短而有則溝霤雙泉四殖甘菓柳裊長條松擎圓蓋池荷炤灼翠葉紅輝微波碧澈潺流灒瀨異禽巡獸飲喙相鳴碩學名賢踵武相望引房清誦列館法言洪鍾一扣應真四集唄響八飛香煙似霧虔禮禪寂六時靡輟方為眾聖万劫之靈場八輩十方三世之菀囿也天平二年四月八日倫艷二統乃刊石樹碑雕飾尊像贊貽嘉福顯彰聖儀高足大沙門統遵法師忘懷體道戒珠皎潔仁智明敏器宇汪庠開妙思於三空之表顯真如於四忍之外接引群生舟航巨海率諸邑義繕立天宮整脩嚴麗兼造白玉像一龕眷屬侍御剞劂鐫磨妙匠精巧三十二滿八十好圓色揜耀靈光暉夜兔以諸勝善仰資皇帝聖曆無窮國境寧泰太后德被蒼海永保仁齡預捨一豪同登我淨若見若聞等一常樂傍盡邊塵後窮來際咸鍾此福其詞曰明明大聖皎皎無著至寂至妙湛然常樂無像無言形名應世七步舉手播宣苦諦聲光振動濯我塵滯化息雙林終歸實際金儀言寢塔像勃興香尊避坐多寶踊昇為摸為揩永劫祇承維大沙門權機應傳英風秀朗弘通常住道德芳烈帝后欽裕搆造靈基朝野傾務遠摹妙喜近光祇樹唯聖唯賢爰依爰附億兆來蘇天龍虔仰城芥千空此基無爽
